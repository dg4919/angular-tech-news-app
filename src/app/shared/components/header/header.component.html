<nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" routerLink="/home">
      <i class="bi bi-lightning-fill"></i> {{ title }}
    </a>

    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div
      class="collapse navbar-collapse"
      [class.show]="mobileMenuOpen"
      id="navbarNav">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="active"
            (click)="navigateTo('/home')"
            >Home</a
          >
        </li>
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            href="#"
            id="categoriesDropdown"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            Categories
          </a>
          <ul class="dropdown-menu" aria-labelledby="categoriesDropdown">
            <li>
              <a
                class="dropdown-item"
                (click)="navigateTo('/category/technology')"
                >Technology</a
              >
            </li>
            <li>
              <a
                class="dropdown-item"
                (click)="navigateTo('/category/business')"
                >Business</a
              >
            </li>
            <li>
              <a class="dropdown-item" (click)="navigateTo('/category/science')"
                >Science</a
              >
            </li>
            <li>
              <a
                class="dropdown-item"
                (click)="navigateTo('/category/entertainment')"
                >Entertainment</a
              >
            </li>
          </ul>
        </li>
        <li class="nav-item">
          <button
            class="btn btn-sm btn-outline-secondary ms-2"
            (click)="toggleDarkMode()">
            <i [class]="darkMode ? 'bi bi-sun-fill' : 'bi bi-moon-fill'"></i>
          </button>
        </li>
      </ul>
    </div>

    <div class="ms-3">
      <app-search-bar (searchSubmit)="onSearch($event)"></app-search-bar>
    </div>
  </div>
</nav>
